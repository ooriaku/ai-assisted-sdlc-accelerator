name: CI

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: '9.0.x'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore AIHarness.sln

      - name: Build
        run: dotnet build AIHarness.sln --no-restore -c Release

      - name: Unit tests (exclude integration)
        run: |
          dotnet test AIHarness.sln \
            --no-build -c Release \
            --filter "Category!=Integration" \
            --logger "trx;LogFileName=unit-tests.trx" \
            --collect "XPlat Code Coverage" \
            --results-directory ./TestResults

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ./TestResults/**/*.trx

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        continue-on-error: true
        with:
          directory: ./TestResults

  push-images:
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR Login
        run: az acr login --name ${{ secrets.ACR_NAME }}

      - uses: ./.github/actions/docker-build-push
        with:
          dockerfile: src/AIHarness.API/Dockerfile
          image_name: aiharness-api
          acr_registry: ${{ secrets.ACR_REGISTRY }}
          image_tag: ${{ github.sha }}

      - uses: ./.github/actions/docker-build-push
        with:
          dockerfile: src/AIHarness.Worker/Dockerfile
          image_name: aiharness-worker
          acr_registry: ${{ secrets.ACR_REGISTRY }}
          image_tag: ${{ github.sha }}
