name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  guard:
    if: >-
      github.event.workflow_run.conclusion == 'success' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - run: echo "CI passed — proceeding with deployment"

  deploy-dev-infra:
    needs: guard
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - uses: ./.github/actions/terraform-deploy
        with:
          environment: dev
          image_tag: ${{ github.event.workflow_run.head_sha || github.sha }}
          tf_state_resource_group: ${{ secrets.TF_STATE_RESOURCE_GROUP }}
          tf_state_storage_account: ${{ secrets.TF_STATE_STORAGE_ACCOUNT }}
          arm_client_id: ${{ secrets.AZURE_CLIENT_ID }}
          arm_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          arm_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  deploy-dev-apps:
    needs: deploy-dev-infra
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - uses: ./.github/actions/smoke-test
        with:
          environment: dev

  # The 'prod' GitHub Environment must have required reviewers configured.
  # GitHub will pause here and notify reviewers before running any prod job.
  deploy-prod-infra:
    needs: deploy-dev-apps
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - uses: ./.github/actions/terraform-deploy
        with:
          environment: prod
          image_tag: ${{ github.event.workflow_run.head_sha || github.sha }}
          tf_state_resource_group: ${{ secrets.TF_STATE_RESOURCE_GROUP }}
          tf_state_storage_account: ${{ secrets.TF_STATE_STORAGE_ACCOUNT }}
          arm_client_id: ${{ secrets.AZURE_CLIENT_ID }}
          arm_tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          arm_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  deploy-prod-apps:
    needs: deploy-prod-infra
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - uses: ./.github/actions/smoke-test
        with:
          environment: prod
